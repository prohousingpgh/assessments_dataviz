name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/data-sync-state.json"
  workflow_dispatch:
    inputs:
      data_release:
        description: data-* release tag to deploy (default latest)
        required: false
        type: string
  release:
    types: [published]

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'data-'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fetch data release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.data_release }}" ]; then
            TAG="${{ inputs.data_release }}"
          else
            TAG=$(curl -s \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=20" \
              | jq -r '[.[].tag_name | select(startswith("data-"))][0]')
          fi
          if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
            echo "::error::No GitHub release tag starting with data-. Publish one first (see DEPLOY.md)."
            exit 1
          fi
          echo "Using data release: ${TAG}"
          asset_id=$(curl -s \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
            | jq -r '.assets[] | select(.name=="data-bundle.zip") | .id')
          if [ -z "${asset_id}" ] || [ "${asset_id}" = "null" ]; then
            echo "::error::Release ${TAG} has no data-bundle.zip asset."
            exit 1
          fi
          curl -L \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" \
            -o /tmp/data-bundle.zip
          unzip -o /tmp/data-bundle.zip -d data/

      # Millage tables ship with app code (split-rate rules, Pittsburgh levies, etc.).
      # Data releases may bundle older copies — always use the commit's JSON here.
      - name: Restore millage tables from this commit
        run: git checkout HEAD -- data/millage_2025.json data/millage_2026.json

      - name: Verify runtime data
        run: python scripts/verify_data.py

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

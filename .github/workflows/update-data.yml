name: Update data bundle

on:
  # Trigger from agc_assessments after output/ is committed (see docs/agc-dispatch-workflow.yml).
  repository_dispatch:
    types: [agc_output_updated]
  schedule:
    # Daily check for new agc_assessments output (skips if SHA unchanged).
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Rebuild even if agc predictions SHA is unchanged
        type: boolean
        default: false
      deploy:
        description: Publish release and trigger deploy
        type: boolean
        default: true

permissions:
  contents: write
  actions: write

concurrency:
  group: update-data-${{ github.repository }}
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install GitHub CLI
        run: |
          type gh >/dev/null 2>&1 || sudo apt-get update && sudo apt-get install -y gh

      - name: Check for upstream changes
        id: changes
        env:
          AGC_ASSESSMENTS_TOKEN: ${{ secrets.AGC_ASSESSMENTS_TOKEN }}
          GH_TOKEN: ${{ secrets.AGC_ASSESSMENTS_TOKEN || github.token }}
        run: |
          set -euo pipefail
          NEW_SHA=$(python scripts/fetch_agc_output.py --print-sha)
          echo "new_sha=${NEW_SHA}" >> "$GITHUB_OUTPUT"
          if [ -f .github/data-sync-state.json ]; then
            OLD_SHA=$(python -c "import json; print(json.load(open('.github/data-sync-state.json')).get('agc_predictions_sha',''))")
          else
            OLD_SHA=""
          fi
          echo "old_sha=${OLD_SHA}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "${NEW_SHA}" != "${OLD_SHA}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild data bundle
        if: steps.changes.outputs.changed == 'true'
        env:
          AGC_ASSESSMENTS_TOKEN: ${{ secrets.AGC_ASSESSMENTS_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: python scripts/rebuild_data_bundle.py

      - name: Commit sync state
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/data-sync-state.json
          git diff --staged --quiet || git commit -m "Update data sync state after agc_assessments rebuild."
          git push

      - name: Resolve release tag
        if: steps.changes.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || inputs.deploy)
        id: release_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="data-$(date -u +%Y-%m-%d)"
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")
          if [ "${code}" = "200" ]; then
            TAG="${TAG}-${GITHUB_RUN_ID}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Publish data release
        if: steps.changes.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || inputs.deploy)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Runtime data ${{ steps.release_tag.outputs.tag }}
          body: >-
            Rebuilt from agc_assessments output
            (predictions SHA: ${{ steps.changes.outputs.new_sha }}).
          files: data/data-bundle.zip
          generate_release_notes: false

      # GITHUB_TOKEN-created releases do not trigger release workflows; dispatch deploy explicitly.
      - name: Trigger deploy
        if: steps.changes.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || inputs.deploy)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          code=$(curl -s -o /tmp/deploy-dispatch.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"data_release\":\"${{ steps.release_tag.outputs.tag }}\"}}")
          if [ "${code}" != "204" ]; then
            echo "::error::Deploy dispatch failed (HTTP ${code}): $(cat /tmp/deploy-dispatch.json)"
            exit 1
          fi
          echo "Triggered deploy for ${{ steps.release_tag.outputs.tag }}"

      - name: No upstream changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "agc_assessments predictions unchanged (${{ steps.changes.outputs.new_sha }}); skipping rebuild."
